<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LadderLogic-Gen Demo</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:#e5e7eb; display:flex; justify-content:center; padding:40px; }
    .container { max-width:700px; width:100%; }
    textarea { width:100%; padding:12px; background:#020617; color:white; border:1px solid #334155; }
    button { margin-top:10px; padding:10px 16px; background:white; color:black; border:none; cursor:pointer; }
    pre { background:#020617; padding:15px; margin-top:15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ LadderLogic-Gen</h1>
    <p>Describe logic → generate ladder</p>

    <textarea id="input" rows="5" placeholder="Start motor when button is pressed..."></textarea>
    <button onclick="generate()">Generate</button>

    <pre id="output"></pre>
  </div>

  <script>
    function generate(){
      const out = document.getElementById('output');
      out.innerText = 'Generating...';
      setTimeout(()=>{
        out.innerText = '|----[ Start_Button ]----[/ Overload ]----( Motor )----|';
      },1000);
    }
  </script>
</body>
</html>
